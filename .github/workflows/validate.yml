name: Validate scaffold

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate scaffold contract
        run: python3 scripts/validate_scaffold.py
      - name: Check shell hooks
        run: bash -n .claude/hooks/*.sh

